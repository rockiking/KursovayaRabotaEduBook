<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в EduBook CRM</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 450px;
            padding: 40px;
        }
        .auth-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .auth-header h1 {
            font-size: 2em;
            color: #333;
            margin-bottom: 10px;
        }
        .auth-header p {
            color: #666;
        }
        .auth-tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .auth-tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            cursor: pointer;
            background: none;
            border: none;
            font-size: 16px;
            transition: all 0.3s;
        }
        .auth-tab.active {
            color: #667eea;
            border-bottom: 2px solid #667eea;
        }
        .auth-form {
            display: none;
        }
        .auth-form.active {
            display: block;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }
        .btn-auth {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 500;
        }
        .btn-auth:hover {
            transform: translateY(-2px);
        }
        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
        .success-message {
            background: #c6f6d5;
            color: #22543d;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>📚 EduBook CRM</h1>
            <p>Войдите или зарегистрируйтесь</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" onclick="switchTab('login')">Вход</button>
            <button class="auth-tab" onclick="switchTab('register')">Регистрация</button>
        </div>

        <div id="errorMessage" class="error-message"></div>
        <div id="successMessage" class="success-message"></div>

        <div id="loginForm" class="auth-form active">
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label>Email или логин:</label>
                    <input type="text" id="loginEmail" required>
                </div>
                <div class="form-group">
                    <label>Пароль:</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn-auth">Войти</button>
            </form>
        </div>

        <div id="registerForm" class="auth-form">
            <form onsubmit="register(event)">
                <div class="form-group">
                    <label>Имя пользователя:</label>
                    <input type="text" id="regName" required>
                </div>
                <div class="form-group">
                    <label>Email:</label>
                    <input type="email" id="regEmail" required>
                </div>
                <div class="form-group">
                    <label>Пароль:</label>
                    <input type="password" id="regPassword" required minlength="6">
                </div>
                <button type="submit" class="btn-auth">Зарегистрироваться</button>
            </form>
        </div>
    </div>

    <script>
        const API_URL = 'http://localhost:5203/api';
        
        // Проверка соединения с сервером при загрузке
        async function testConnection() {
            try {
                const response = await fetch(`${API_URL}/Material`, {
                    method: 'GET',
                    headers: { 'Content-Type': 'application/json' }
                });
                console.log('Сервер доступен, статус:', response.status);
            } catch (error) {
                console.error('Сервер недоступен:', error);
                showError('Не удается подключиться к серверу. Убедитесь, что бэкенд запущен на порту 5203');
            }
        }
        
        testConnection();

        function switchTab(tab) {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.auth-form').forEach(f => f.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.auth-tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.auth-tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            
            hideMessages();
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 5000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }

        function hideMessages() {
            document.getElementById('errorMessage').style.display = 'none';
            document.getElementById('successMessage').style.display = 'none';
        }

        async function login(event) {
            event.preventDefault();
            hideMessages();

            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            console.log('Отправка запроса на:', `${API_URL}/Authification/login`);
            console.log('Данные:', { email, password });

            try {
                const response = await fetch(`${API_URL}/Authification/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                console.log('Статус ответа:', response.status);
                const data = await response.json();
                console.log('Ответ сервера:', data);

                if (response.ok) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));
                    showSuccess('Вход выполнен успешно! Перенаправление...');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } else {
                    showError(data.message || 'Ошибка входа');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showError('Ошибка подключения к серверу. Убедитесь, что бэкенд запущен на http://localhost:5203');
            }
        }

        async function register(event) {
            event.preventDefault();
            hideMessages();

            const name = document.getElementById('regName').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;

            if (password.length < 6) {
                showError('Пароль должен быть не менее 6 символов');
                return;
            }

            console.log('Отправка запроса на:', `${API_URL}/Authification/register`);
            console.log('Данные:', { name, email, password, role_id: 3 });

            try {
                const response = await fetch(`${API_URL}/Authification/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name: name,
                        email: email, 
                        password: password,
                        role_id: 3
                    })
                });

                console.log('Статус ответа:', response.status);
                const data = await response.json();
                console.log('Ответ сервера:', data);

                if (response.ok) {
                    if (data.token) {
                        localStorage.setItem('token', data.token);
                        localStorage.setItem('user', JSON.stringify(data.user));
                        showSuccess('Регистрация прошла успешно! Перенаправление...');
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 1000);
                    } else {
                        showSuccess('Регистрация прошла успешно! Теперь вы можете войти.');
                        setTimeout(() => {
                            switchTab('login');
                            document.getElementById('loginEmail').value = email;
                        }, 2000);
                    }
                } else {
                    showError(data.message || 'Ошибка регистрации');
                }
            } catch (error) {
                console.error('Ошибка:', error);
                showError('Ошибка подключения к серверу. Убедитесь, что бэкенд запущен на http://localhost:5203');
            }
        }
    </script>
</body>
</html>
